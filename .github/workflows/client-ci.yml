name: Client CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Client/**'
      - '.github/workflows/client-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'Client/**'
      - '.github/workflows/client-ci.yml'

permissions:
  contents: read

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Build and test Vue client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build client
        run: npm run build